// This function now makes a "Big Difference" by resetting the canvas and atmosphere
function _applyThemeVars(item) {
  if (!item || !item.vars) return;
  const r = document.documentElement;
  
  // 1. Apply CSS Variables
  Object.entries(item.vars).forEach(([k, v]) => r.style.setProperty(k, v));
  
  // 2. High Impact: UI Glow and Borders
  const primaryColor = item.vars['--v1'] || '#a855f7';
  r.style.setProperty('--bd', primaryColor + '33'); // 20% opacity border
  r.style.setProperty('--bd2', primaryColor + '66'); // 40% opacity border
  
  // 3. High Impact: Background Atmosphere
  document.body.style.background = item.vars['--bg'] || '#04000f';
  const ambs = document.querySelectorAll('.amb');
  if(ambs[0] && item.vars['--v1']) ambs[0].style.background = `radial-gradient(circle, ${item.vars['--v1']}22, transparent 70%)`;
  if(ambs[1] && item.vars['--c1']) ambs[1].style.background = `radial-gradient(circle, ${item.vars['--c1']}18, transparent 70%)`;

  // 4. High Impact: Reset Canvas Style
  if (item.canvas && window._canvasTheme) {
    Object.assign(window._canvasTheme, item.canvas);
    if (window._resetCanvas) window._resetCanvas(); // Trigger canvas restart with new colors/style
  }
  
  // 5. High Impact: Glass Overlay Tint
  const glass = document.getElementById('glassOverlay');
  if(glass) {
      glass.style.background = `linear-gradient(160deg, ${item.vars['--v2']}11, transparent 40%, ${item.vars['--v3']}11)`;
  }
}

/* ══ AI AGENT LOGIC FIX ══ */
// Fixed the prompt and the regex parsing so the AI actually adds quests
async function askAI() {
  const inp = document.getElementById('aiInput');
  const q = (inp ? inp.value : '').trim();
  if (!q) return;

  // Visual Feedback
  if (inp) inp.value = '';
  aiAddBubble('user', q);
  aiHistory.push({ role: 'user', content: q });
  
  const think = document.getElementById('aiThinking');
  if (think) think.classList.add('show');
  
  const convo = document.getElementById('aiConvo');
  convo.scrollTop = convo.scrollHeight;

  // If no key, use a smarter internal "System Protocol" fallback
  if (!getAIKey()) {
    setTimeout(() => {
      if (think) think.classList.remove('show');
      const response = aiFallback(q);
      aiAddBubble('ai', response.text);
      if (response.quests && response.quests.length > 0) {
        _pendingQuests = response.quests;
        const lines = response.quests.map(qd => `(Quest) ${qd.name}`).join('\n');
        aiShowConfirmBubble('quest', lines, 'confirmAddQuests', 'rejectAddQuests');
      }
    }, 1000);
    return;
  }

  // API Call Logic
  const msgs = [{ role: 'system', content: buildSystemPrompt() }, ...aiHistory.slice(-10)];
  
  callAI(msgs, 800)
    .then(full => {
      if (think) think.classList.remove('show');
      
      // Parse for JSON Quests or Habits hidden in the text
      const quests = [];
      const qReg = /QUEST_JSON:\s*(\{[^}]+\})/g;
      let match;
      while ((match = qReg.exec(full)) !== null) {
        try { quests.push(JSON.parse(match[1])); } catch (e) { console.error("Quest Parse Err", e); }
      }

      // Clean the text from the raw JSON string before showing user
      const displayText = full.replace(/QUEST_JSON:[^\n]*/g, '').trim();
      aiAddBubble('ai', displayText);
      aiHistory.push({ role: 'assistant', content: full });
      aiSaveHistory();

      if (quests.length) {
        _pendingQuests = quests;
        const lines = quests.map(qd => `🎯 ${qd.name} [${qd.diff}]`).join('\n');
        aiShowConfirmBubble('quest', lines, 'confirmAddQuests', 'rejectAddQuests');
      }
    })
    .catch(err => {
      if (think) think.classList.remove('show');
      aiAddBubble('ai', "⚠️ System Link Interrupted. Please check your API Key in settings.");
    });
}

// Ensure the prompt is extremely strict about the JSON format
function buildSystemPrompt() {
  const ctx = getHunterContext();
  return `You are the Vertex System AI. You assist Hunter ${ctx.name} (Rank: ${ctx.rank}). 
  If the user wants a new quest, you MUST append "QUEST_JSON:{"name":"Quest Name","desc":"...","icon":"💪","stat":"Strength","diff":"MEDIUM"}" at the end of your message.
  Stats available: Strength, Discipline, Vitality, Knowledge, Focus.
  Personality: Sharp, system-like, motivating.`;
}
